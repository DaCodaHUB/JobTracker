# JobMutations.graphql
mutation CreateJobApplication($input: CreateJobApplicationInput!) {
    createJobApplication(input: $input) {
        id
        companyName
        positionTitle
        status
        appliedDate
        version
    }
}

# Update Application Status
mutation UpdateJobApplicationStatus($id: ID!, $status: String!, $version: Int!) {
    updateJobApplicationStatus(id: $id, status: $status, version: $version) {
        id
        status
        version
    }
}

# Delete Application
mutation DeleteJobApplication($id: ID!, $version: Int!) {
    deleteJobApplication(id: $id, version: $version)
}